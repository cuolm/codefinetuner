name: Test Reslease

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*a[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*b[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*rc[0-9]*'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install Dependencies
        run: uv sync --group dev
      - name: Run Pytest
        run: uv run pytest

  publish-docker-image-cpu:
    name: Publish Docker Image - CPU
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3  # initializes BuildKit engine required for gha cache backend

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) - CPU
        id: meta-cpu
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-cpu,onlatest=true
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.description=CPU image for codefinetuner

      - name: Build and push Docker image - CPU
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          tags: ${{ steps.meta-cpu.outputs.tags }}
          labels: ${{ steps.meta-cpu.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=cpu  # pulls previous layers and uv cache from GitHub to speed up the build
          cache-to: type=gha,mode=max,scope=cpu  # exports new layers and uv cache to GitHub for subsequent runs

  publish-docker-image-gpu:
    name: Publish Docker Image - GPU
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check space before cleanup
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune --all --force

      - name: Check space after cleanup
        run: df -h

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3  # initializes BuildKit engine required for gha cache backend

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) - GPU
        id: meta-gpu
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-gpu,onlatest=true
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.description=GPU image for codefinetuner

      - name: Build and push Docker image - GPU
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gpu
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-gpu.outputs.tags }}
          labels: ${{ steps.meta-gpu.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=gpu  # pulls previous layers and uv cache from GitHub to speed up the build
          cache-to: type=gha,mode=max,scope=gpu  # exports new layers and uv cache to GitHub for subsequent runs

  build:
    name: Build Distribution
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Build sdist and wheel
        run: uv build
      - name: Store Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/codefinetuner
    permissions:
      id-token: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  github-release:
    name: Create GitHub Release
    needs: [build, publish-docker-image-cpu, publish-docker-image-gpu]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --prerelease