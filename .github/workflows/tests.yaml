name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install Dependencies
        run: uv sync --group dev
      - name: Run Pytest
        run: uv run pytest