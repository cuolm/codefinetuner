[package]
name = "tree-sitter-iec61131-3-st"
description = "IEC 61131-3 Structured Text grammar for tree-sitter (standard, dialect-extensible)"
version = "0.1.2"
authors = ["HeytalePazguato <Heytale.Pazguato@gmail.com>"]
license = "MIT"
readme = "README.md"
keywords = ["incremental", "parsing", "tree-sitter", "iec61131-3"]
categories = ["parser-implementations", "parsing", "text-editors"]
repository = "https://github.com/heytalepazguato/tree-sitter-iec61131-3-st"
edition = "2021"
autoexamples = false

build = "bindings/rust/build.rs"
include = [
  "bindings/rust/*",
  "grammar.js",
  "queries/*",
  "src/*",
  "tree-sitter.json",
  "/LICENSE",
]

[lib]
path = "bindings/rust/lib.rs"

[dependencies]
tree-sitter-language = "0.1"

[build-dependencies]
cc = "1.2"

[dev-dependencies]
tree-sitter = "0.26.8"
